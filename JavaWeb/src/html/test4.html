<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <script type="text/javascript">
    function clickFun() {
      var elementById = document.getElementById("name");
      var name = elementById.value;
      var p = /^\w{5,12}$/;

      if (p.test(name)) {
        alert("ok");
      } else {
        alert("no");
      }
    }
  </script>
</head>
<body>
username<input type="text" id="name" value="name..."/>
<button onclick="clickFun()">submit</button>
</body>
</html>
